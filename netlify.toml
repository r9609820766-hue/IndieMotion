# ======================================================
# NETLIFY CONFIGURATION FOR INDIEMOTION OTT PLATFORM
# Clean URLs, SPA fallback, and redirect rules
# ======================================================

[build]
publish = "."

# Redirects and rewrites for clean URLs
[[redirects]]
from = "/"
to = "/index.html"
status = 200

# Auth page
[[redirects]]
from = "/auth"
to = "/auth.html"
status = 200

# Profile page
[[redirects]]
from = "/profile"
to = "/profile.html"
status = 200

# Movies listing
[[redirects]]
from = "/movies"
to = "/movies.html"
status = 200

# Movie details (clean URL: /movie/123)
[[redirects]]
from = "/movie/:id"
to = "/movie-details.html?id=:id"
status = 200

# Series details (clean URL: /series/456)
[[redirects]]
from = "/series/:id"
to = "/series-details.html?id=:id"
status = 200

# Watch page (video player)
[[redirects]]
from = "/watch/:type/:id"
to = "/watch.html?type=:type&id=:id"
status = 200

# Admin routes
[[redirects]]
from = "/admin/login"
to = "/admin-login.html"
status = 200

[[redirects]]
from = "/admin/dashboard"
to = "/admin-dashboard.html"
status = 200

[[redirects]]
from = "/admin/movies"
to = "/admin-movies.html"
status = 200

[[redirects]]
from = "/admin/series"
to = "/admin-series.html"
status = 200

[[redirects]]
from = "/admin/categories"
to = "/admin-categories.html"
status = 200

[[redirects]]
from = "/admin/genres"
to = "/admin-genres.html"
status = 200

[[redirects]]
from = "/admin/users"
to = "/admin-users.html"
status = 200

[[redirects]]
from = "/admin/reports"
to = "/admin-reports.html"
status = 200

[[redirects]]
from = "/admin/settings"
to = "/admin-settings.html"
status = 200

# Catch-all: serve 404 page (optional, but can redirect to index for SPA-like behavior)
# For true 404, you can create a 404.html
[[redirects]]
from = "/*"
to = "/404.html"
status = 404
force = false

# Headers for security and caching
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Cache-Control = "public, max-age=0, must-revalidate"

# Cache static assets longer
[[headers]]
for = "/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.css"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.js"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.png"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.jpg"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.webp"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"