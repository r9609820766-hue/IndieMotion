<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IndieMotion - Login / Register</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #141414 0%, #0a0a0a 100%);
        }
        .auth-card {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 2rem;
            max-width: 450px;
            width: 100%;
            margin: 2rem auto;
        }
        .auth-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }
        .form-control {
            background-color: #2c2c2c;
            border: 1px solid #404040;
            color: white;
        }
        .form-control:focus {
            background-color: #3a3a3a;
            border-color: #e50914;
            box-shadow: 0 0 0 0.2rem rgba(229, 9, 20, 0.25);
        }
        .btn-auth {
            background-color: #e50914;
            border: none;
            padding: 0.75rem;
            font-weight: 600;
        }
        .btn-auth:hover {
            background-color: #f6121d;
        }
        .toggle-link {
            color: #e50914;
            cursor: pointer;
            text-decoration: none;
        }
        .toggle-link:hover {
            text-decoration: underline;
        }
        .error-msg {
            color: #ff6b6b;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <a href="index.html" class="navbar-brand fw-bold fs-2 text-white">Indie<span class="text-danger">Motion</span></a>
                <p class="text-white-50 mt-2">Stream independent cinema</p>
            </div>
            
            <!-- Login Form -->
            <div id="loginForm">
                <h2 class="auth-title text-center">Sign In</h2>
                <form id="loginFormElement">
                    <div class="mb-3">
                        <label for="loginEmail" class="form-label text-white-50">Email address</label>
                        <input type="email" class="form-control" id="loginEmail" required>
                    </div>
                    <div class="mb-3">
                        <label for="loginPassword" class="form-label text-white-50">Password</label>
                        <input type="password" class="form-control" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn btn-auth w-100 text-white">Sign In</button>
                    <div id="loginError" class="error-msg text-center"></div>
                </form>
                <div class="text-center mt-3">
                    <span class="text-white-50">New to IndieMotion? </span>
                    <a class="toggle-link" onclick="toggleForms()">Create an account</a>
                </div>
            </div>
            
            <!-- Register Form (hidden initially) -->
            <div id="registerForm" style="display: none;">
                <h2 class="auth-title text-center">Sign Up</h2>
                <form id="registerFormElement">
                    <div class="mb-3">
                        <label for="regName" class="form-label text-white-50">Full Name</label>
                        <input type="text" class="form-control" id="regName" required>
                    </div>
                    <div class="mb-3">
                        <label for="regEmail" class="form-label text-white-50">Email address</label>
                        <input type="email" class="form-control" id="regEmail" required>
                    </div>
                    <div class="mb-3">
                        <label for="regPassword" class="form-label text-white-50">Password</label>
                        <input type="password" class="form-control" id="regPassword" required minlength="6">
                        <div class="form-text text-white-50">Password must be at least 6 characters.</div>
                    </div>
                    <button type="submit" class="btn btn-auth w-100 text-white">Sign Up</button>
                    <div id="registerError" class="error-msg text-center"></div>
                </form>
                <div class="text-center mt-3">
                    <span class="text-white-50">Already have an account? </span>
                    <a class="toggle-link" onclick="toggleForms()">Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase initialization - use different variable name to avoid conflict
        const SUPABASE_URL = 'https://lxqxdtsgwgdogmncgaqj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4cXhkdHNnd2dkb2dtbmNnYXFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODkyMTgsImV4cCI6MjA5Njc2NTIxOH0.pkJOOXG9NkVqsRloO3lm1dRWXcrQESBlEiXW8g_Oh-8';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Check URL parameters for default tab (register)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('register') === 'true') {
            toggleForms();
        }
        
        // Toggle between login and register forms
        function toggleForms() {
            const loginDiv = document.getElementById('loginForm');
            const registerDiv = document.getElementById('registerForm');
            if (loginDiv.style.display === 'none') {
                loginDiv.style.display = 'block';
                registerDiv.style.display = 'none';
            } else {
                loginDiv.style.display = 'none';
                registerDiv.style.display = 'block';
            }
        }
        
        // Login handler
        document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            errorDiv.innerText = '';
            
            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                // Successful login - redirect to homepage or previous page
                const redirectTo = localStorage.getItem('redirectAfterLogin') || '/index.html';
                localStorage.removeItem('redirectAfterLogin');
                window.location.href = redirectTo;
            } catch (error) {
                errorDiv.innerText = error.message || 'Login failed. Please check your credentials.';
            }
        });
        
        // Register handler
        document.getElementById('registerFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const errorDiv = document.getElementById('registerError');
            errorDiv.innerText = '';
            
            if (password.length < 6) {
                errorDiv.innerText = 'Password must be at least 6 characters.';
                return;
            }
            
            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            name: name
                        }
                    }
                });
                
                if (error) throw error;
                
                if (data.user) {
                    // Profile will be auto-created via database trigger
                    alert('Registration successful! Please sign in.');
                    toggleForms(); // Switch to login form
                    // Clear register fields
                    document.getElementById('regName').value = '';
                    document.getElementById('regEmail').value = '';
                    document.getElementById('regPassword').value = '';
                } else {
                    errorDiv.innerText = 'Registration failed. Please try again.';
                }
            } catch (error) {
                errorDiv.innerText = error.message || 'Registration failed. Email might already be in use.';
            }
        });
        
        // Store current page to redirect after login (if accessed from protected page)
        if (document.referrer && !document.referrer.includes('auth.html')) {
            localStorage.setItem('redirectAfterLogin', document.referrer);
        }
    </script>
</body>
</html>
