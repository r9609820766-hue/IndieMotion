<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndieMotion - Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Same beautiful styles as before - keep them */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at 10% 20%, #0a0a0a, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(45deg, rgba(229,9,20,0.03) 0px, rgba(229,9,20,0.03) 2px, transparent 2px, transparent 8px);
            animation: shift 20s linear infinite;
        }
        @keyframes shift { 0% { transform: translate(0,0); } 100% { transform: translate(20px,20px); } }
        .admin-card {
            position: relative;
            z-index: 2;
            background: rgba(15,15,15,0.92);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            border: 1px solid rgba(229,9,20,0.4);
            padding: 2.5rem;
            width: 460px;
            max-width: 92%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .admin-badge {
            background: linear-gradient(135deg, #e50914, #b00610);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .brand { font-size: 2rem; font-weight: 800; }
        .brand span { color: #e50914; }
        .input-group-custom {
            background: #1e1e1e;
            border-radius: 12px;
            border: 1px solid #2c2c2c;
        }
        .input-group-custom:focus-within { border-color: #e50914; box-shadow: 0 0 0 3px rgba(229,9,20,0.2); }
        .input-group-custom input { background: transparent; border: none; color: white; padding: 0.8rem 1rem; }
        .input-group-custom i { color: #6c757d; padding-left: 1rem; }
        .btn-admin {
            background: linear-gradient(95deg, #e50914, #ff2e3a);
            border: none;
            padding: 0.85rem;
            font-weight: 700;
            border-radius: 40px;
        }
        .btn-admin:hover { transform: scale(1.02); }
        .back-link { color: #9e9e9e; font-size: 0.85rem; }
        .back-link:hover { color: #e50914; }
    </style>
</head>
<body>
    <div class="admin-card">
        <div class="text-center">
            <div class="admin-badge mx-auto"><i class="fas fa-shield-haltered"></i> ADMIN AREA</div>
            <div class="brand">Indie<span>Motion</span></div>
            <p class="text-white-50 mt-2 mb-4">Administrator sign in</p>
        </div>
        <form id="adminLoginForm">
            <div class="mb-3">
                <div class="input-group-custom d-flex align-items-center">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="adminEmail" class="form-control" placeholder="Email address" required>
                </div>
            </div>
            <div class="mb-4">
                <div class="input-group-custom d-flex align-items-center">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="adminPassword" class="form-control" placeholder="Password" required>
                </div>
            </div>
            <button type="submit" class="btn-admin w-100 text-white"><i class="fas fa-arrow-right-to-bracket me-2"></i>Login to Dashboard</button>
            <div id="errorMsg" class="text-danger mt-3 small text-center"></div>
        </form>
        <div class="text-center mt-4">
            <a href="index.html" class="back-link text-decoration-none"><i class="fas fa-chevron-left me-1"></i> Back to Home</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://lxqxdtsgwgdogmncgaqj.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4cXhkdHNnd2dkb2dtbmNnYXFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODkyMTgsImV4cCI6MjA5Njc2NTIxOH0.pkJOOXG9NkVqsRloO3lm1dRWXcrQESBlEiXW8g_Oh-8';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // Check existing session
        (async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const { data: profile } = await supabaseClient.from('profiles').select('role').eq('id', session.user.id).single();
                if (profile?.role === 'admin') {
                    window.location.href = '/admin-dashboard.html';
                }
            }
        })();

        const form = document.getElementById('adminLoginForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.innerHTML = '';

            const btn = form.querySelector('button');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Checking...';

            try {
                // 1. Sign in
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;

                console.log("User signed in:", data.user.id);

                // 2. Fetch profile
                const { data: profile, error: profileErr } = await supabaseClient
                    .from('profiles')
                    .select('role, name')
                    .eq('id', data.user.id)
                    .single();

                if (profileErr) {
                    console.error("Profile fetch error:", profileErr);
                    throw new Error(`Profile not found. Please ensure the user has a profile. Error: ${profileErr.message}`);
                }

                console.log("Profile role:", profile.role);

                if (!profile || profile.role !== 'admin') {
                    await supabaseClient.auth.signOut();
                    throw new Error(`Access denied: Your role is "${profile?.role || 'none'}". Admin required.`);
                }

                // Success
                window.location.href = '/admin-dashboard.html';
            } catch (err) {
                console.error("Admin login error:", err);
                errorDiv.innerHTML = `<i class="fas fa-exclamation-triangle me-1"></i> ${err.message}`;
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
