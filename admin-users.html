<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - IndieMotion Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; }
        .navbar-admin { background: #0f0f0f; border-bottom: 1px solid #222; padding: 0.75rem 1.5rem; }
        .navbar-brand { font-size: 1.8rem; font-weight: 800; }
        .navbar-brand .indie { color: white; }
        .navbar-brand .motion { color: #e50914; }
        .offcanvas { background: linear-gradient(180deg, #0f0f0f 0%, #050505 100%); width: 280px; border-right: 1px solid #222; }
        .nav-admin .nav-link { color: #b3b3b3; padding: 0.75rem 1rem; border-radius: 12px; transition: 0.2s; font-weight: 500; }
        .nav-admin .nav-link i { width: 28px; margin-right: 8px; }
        .nav-admin .nav-link:hover, .nav-admin .nav-link.active { background: #e50914; color: white; }
        .admin-content { padding: 2rem; margin-top: 70px; }
        .btn-danger { background-color: #e50914; border: none; }
        .btn-danger:hover { background-color: #f6121d; }
        .table-dark-custom { background-color: #141414; }
        .table-dark-custom th { border-bottom-color: #333; }
        .modal-content { background: #141414; border: 1px solid #333; }
        .form-control, .form-select { background-color: #2c2c2c; border: 1px solid #404040; color: white; }
        .form-control:focus, .form-select:focus { border-color: #e50914; box-shadow: 0 0 0 0.2rem rgba(229,9,20,0.25); }
        .badge-admin { background-color: #e50914; }
        .badge-user { background-color: #28a745; }
        .badge-suspended { background-color: #dc3545; }
        @media (max-width: 768px) { .admin-content { padding: 1rem; } }
    </style>
</head>
<body>

    <!-- Top Navbar -->
    <nav class="navbar navbar-admin fixed-top">
        <div class="container-fluid">
            <button class="btn btn-link text-white" type="button" data-bs-toggle="offcanvas" data-bs-target="#adminSidebar">
                <i class="fas fa-bars fs-4"></i>
            </button>
            <a class="navbar-brand mx-auto" href="#"><span class="indie">Indie</span><span class="motion">Motion</span></a>
            <div class="dropdown">
                <button class="btn btn-link text-white dropdown-toggle" type="button" data-bs-toggle="dropdown">
                    <i class="fas fa-user-circle fs-4"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
                    <li><span id="adminEmailDisplay" class="dropdown-item-text small text-white-50"></span></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="#" id="adminLogoutBtn"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="adminSidebar">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title text-white">Menu</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <ul class="nav nav-admin flex-column">
                <li class="nav-item"><a class="nav-link" href="admin-dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-movies.html"><i class="fas fa-film"></i> Movies</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-series.html"><i class="fas fa-tv"></i> Series</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-categories.html"><i class="fas fa-tags"></i> Categories</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-genres.html"><i class="fas fa-music"></i> Genres</a></li>
                <li class="nav-item"><a class="nav-link active" href="admin-users.html"><i class="fas fa-users"></i> Users</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-reports.html"><i class="fas fa-chart-line"></i> Reports</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-settings.html"><i class="fas fa-cog"></i> Settings</a></li>
            </ul>
            <hr class="bg-secondary my-4">
            <button id="adminLogoutBtnSidebar" class="btn btn-outline-danger w-100"><i class="fas fa-sign-out-alt me-2"></i>Logout</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="admin-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Manage Users</h2>
            <div class="d-flex gap-2">
                <input type="text" id="searchUser" class="form-control" placeholder="Search email..." style="width: 250px;">
                <button class="btn btn-outline-secondary" onclick="searchUsers()"><i class="fas fa-search"></i></button>
            </div>
        </div>

        <!-- Users Table -->
        <div class="table-responsive">
            <table class="table table-dark table-hover table-dark-custom">
                <thead>
                    <tr><th>ID</th><th>Email</th><th>Name</th><th>Role</th><th>Joined</th><th>Actions</th></tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr><td colspan="6" class="text-center">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div class="modal fade" id="userModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-white">Edit User</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="userForm">
                        <input type="hidden" id="editUserId">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" id="editUserName" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Role</label>
                            <select id="editUserRole" class="form-select">
                                <option value="user">User</option>
                                <option value="admin">Admin</option>
                                <option value="suspended">Suspended</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-danger w-100">Update User</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://lxqxdtsgwgdogmncgaqj.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4cXhkdHNnd2dkb2dtbmNnYXFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODkyMTgsImV4cCI6MjA5Njc2NTIxOH0.pkJOOXG9NkVqsRloO3lm1dRWXcrQESBlEiXW8g_Oh-8';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let currentAdmin = null;
        let allUsers = [];

        async function checkAdmin() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = '/admin-login.html'; return false; }
            const { data: profile } = await supabaseClient.from('profiles').select('role').eq('id', session.user.id).single();
            if (!profile || profile.role !== 'admin') { await supabaseClient.auth.signOut(); window.location.href = '/admin-login.html'; return false; }
            currentAdmin = session.user;
            document.getElementById('adminEmailDisplay').innerText = currentAdmin.email;
            return true;
        }

        async function loadUsers() {
            // Fetch profiles and join with auth.users email
            const { data: profiles, error } = await supabaseClient
                .from('profiles')
                .select('id, name, role, created_at')
                .order('created_at', { ascending: false });
            if (error) { console.error(error); return; }
            
            // Fetch emails from auth.users (can't directly join, so we fetch each or use a function)
            // Instead, we use a single query to get user metadata via supabase.auth.admin? Not available.
            // Alternative: we can store email in profiles? We don't. We'll fetch from auth.users via RPC or separate calls.
            // For simplicity, we'll just show the profile data and assume email is known from a custom function.
            // Actually we can call supabase.auth.getUser() for each? That's rate limited.
            // Better: Store email in profiles upon creation. But our trigger doesn't. Let's modify trigger to store email.
            // For now, we'll just display "email@example.com" placeholder and provide SQL to update profiles with emails.
            // But we can also use a Supabase RPC to get user emails (requires service role). 
            // I'll add an SQL migration to populate profiles.email from auth.users.
            // Meanwhile, we'll fetch all users from auth.admin? Not possible with anon key.
            // Workaround: we'll display user IDs and tell admin to check email in auth table.
            // Instead, let's do a cleaner approach: we'll use the profiles table and assume email is stored.
            // I'll add a column `email` to profiles and backfill.
            const { data: userEmails } = await supabaseClient.rpc('get_all_user_emails');
            // If RPC doesn't exist, we'll show placeholder.
            const emailMap = {};
            if (userEmails) {
                userEmails.forEach(u => { emailMap[u.id] = u.email; });
            }
            
            const users = profiles.map(p => ({
                id: p.id,
                email: emailMap[p.id] || 'N/A',
                name: p.name || '—',
                role: p.role,
                created_at: p.created_at
            }));
            allUsers = users;
            renderUsers(users);
        }

        function renderUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            if (!users.length) { tbody.innerHTML = '<tr><td colspan="6" class="text-center">No users found</td></tr>'; return; }
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td><code>${user.id.substring(0,8)}...</code></td>
                    <td>${user.email}</td>
                    <td>${user.name}</td>
                    <td><span class="badge ${user.role === 'admin' ? 'badge-admin' : (user.role === 'suspended' ? 'badge-suspended' : 'badge-user')}">${user.role}</span></td>
                    <td>${new Date(user.created_at).toLocaleDateString()}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary me-1" onclick="editUser('${user.id}')"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteUser('${user.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function searchUsers() {
            const term = document.getElementById('searchUser').value.toLowerCase();
            const filtered = allUsers.filter(u => u.email.toLowerCase().includes(term) || (u.name && u.name.toLowerCase().includes(term)));
            renderUsers(filtered);
        }

        async function editUser(userId) {
            const user = allUsers.find(u => u.id === userId);
            if (!user) return;
            document.getElementById('editUserId').value = user.id;
            document.getElementById('editUserName').value = user.name || '';
            document.getElementById('editUserRole').value = user.role;
            new bootstrap.Modal(document.getElementById('userModal')).show();
        }

        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = document.getElementById('editUserId').value;
            const name = document.getElementById('editUserName').value;
            const role = document.getElementById('editUserRole').value;
            const { error } = await supabaseClient.from('profiles').update({ name, role }).eq('id', userId);
            if (error) alert('Error: ' + error.message);
            else {
                bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
                loadUsers();
            }
        });

        async function deleteUser(userId) {
            if (userId === currentAdmin.id) {
                alert('You cannot delete your own admin account.');
                return;
            }
            if (!confirm('Delete this user? This will remove profile, watch history, watchlist, ratings. The auth user entry remains and must be deleted manually from Supabase Auth panel. Continue?')) return;
            // Delete related records (watch_history, watchlist, ratings)
            await supabaseClient.from('watch_history').delete().eq('user_id', userId);
            await supabaseClient.from('watchlist').delete().eq('user_id', userId);
            await supabaseClient.from('ratings').delete().eq('user_id', userId);
            const { error } = await supabaseClient.from('profiles').delete().eq('id', userId);
            if (error) alert('Error deleting profile: ' + error.message);
            else {
                alert('Profile deleted. To fully remove the user, go to Supabase Dashboard → Authentication → Users and delete the user manually.');
                loadUsers();
            }
        }

        function setupLogout() {
            const fn = async () => { await supabaseClient.auth.signOut(); window.location.href = '/admin-login.html'; };
            document.getElementById('adminLogoutBtn')?.addEventListener('click', fn);
            document.getElementById('adminLogoutBtnSidebar')?.addEventListener('click', fn);
        }

        // Add missing SQL for email retrieval and backfill (run once)
        async function ensureEmailColumn() {
            // We'll just attempt to call RPC, if fails we show note
            try {
                const { data } = await supabaseClient.rpc('get_all_user_emails');
                if (!data) {
                    console.warn("RPC not available. To show emails, create a function or add email column.");
                }
            } catch(e) {
                console.warn("Email retrieval not set up. Admin can still manage by ID.");
            }
        }

        (async () => {
            if (await checkAdmin()) {
                await ensureEmailColumn();
                await loadUsers();
                setupLogout();
            }
        })();
    </script>
    <!-- Note: The following SQL should be run in Supabase SQL editor to enable email display -->
    <!--
        -- Add email column to profiles (optional but recommended)
        ALTER TABLE profiles ADD COLUMN IF NOT EXISTS email TEXT;
        -- Update existing profiles with emails from auth.users
        UPDATE profiles SET email = auth_users.email FROM auth.users WHERE profiles.id = auth_users.id;
        -- Create a function to retrieve all user emails (if you don't want to store email column)
        CREATE OR REPLACE FUNCTION get_all_user_emails()
        RETURNS TABLE(id UUID, email TEXT)
        LANGUAGE sql SECURITY DEFINER
        AS $$
            SELECT id, email FROM auth.users;
        $$;
    -->
</body>
</html>
