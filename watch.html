<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IndieMotion - Watch</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Cloudinary Video Player CSS & JS -->
    <link href="https://cdn.jsdelivr.net/npm/cloudinary-video-player@1.11.4/dist/cld-video-player.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/cloudinary-video-player@1.11.4/dist/cld-video-player.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #000;
            padding-top: 0;
        }
        .video-container {
            position: relative;
            width: 100%;
            background: black;
        }
        .cld-video-player {
            width: 100%;
            aspect-ratio: 16 / 9;
        }
        .video-info {
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 100%);
            padding: 1rem 2rem;
        }
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }
        .back-link:hover {
            background: #e50914;
            color: white;
        }
        @media (max-width: 768px) {
            .video-info { padding: 1rem; }
        }
    </style>
</head>
<body class="bg-black">

    <a href="javascript:history.back()" class="back-link"><i class="fas fa-arrow-left me-2"></i>Back</a>

    <div class="video-container">
        <video id="videoPlayer" class="cld-video-player cld-fluid" controls playsinline></video>
    </div>
    
    <div class="video-info text-white">
        <h1 id="videoTitle" class="h3">Loading...</h1>
        <p id="videoDescription" class="text-white-50 mb-2"></p>
        <div class="d-flex gap-3">
            <span id="contentTypeBadge" class="badge bg-danger"></span>
            <span id="videoDuration"></span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============================================
        // SUPABASE INITIALIZATION (self-contained)
        // ============================================
        const SUPABASE_URL = 'https://lxqxdtsgwgdogmncgaqj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4cXhkdHNnd2dkb2dtbmNnYXFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODkyMTgsImV4cCI6MjA5Njc2NTIxOH0.pkJOOXG9NkVqsRloO3lm1dRWXcrQESBlEiXW8g_Oh-8';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ============================================
        // GLOBALS
        // ============================================
        const CLOUD_NAME = 'drf0guw5w';
        const urlParams = new URLSearchParams(window.location.search);
        const contentType = urlParams.get('type'); // 'movie' or 'episode'
        const contentId = urlParams.get('id');
        
        let currentUser = null;
        let contentData = null;
        let videoUrl = null;
        let player = null;
        let duration = 0;
        let saveIntervalTimer = null;
        
        // ============================================
        // AUTH CHECK
        // ============================================
        async function getCurrentUser() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            currentUser = session?.user || null;
        }
        
        // ============================================
        // LOAD CONTENT (MOVIE OR EPISODE)
        // ============================================
        async function loadContent() {
            try {
                if (contentType === 'movie') {
                    const { data, error } = await supabaseClient
                        .from('movies')
                        .select('*')
                        .eq('id', contentId)
                        .single();
                    if (error) throw error;
                    contentData = data;
                    videoUrl = data.video_url;
                    document.getElementById('videoTitle').innerText = data.title;
                    document.getElementById('videoDescription').innerText = data.description || '';
                    document.getElementById('contentTypeBadge').innerText = 'Movie';
                    if (data.duration) {
                        const mins = Math.floor(data.duration / 60);
                        const secs = data.duration % 60;
                        document.getElementById('videoDuration').innerHTML = `<i class="fas fa-clock me-1"></i> ${mins}:${secs.toString().padStart(2,'0')} min`;
                    }
                    // Increment view count (ignore if RPC missing)
                    try {
                        await supabaseClient.rpc('increment_movie_views', { movie_id: contentId });
                    } catch(e) { console.log("View count not incremented (RPC missing)"); }
                } 
                else if (contentType === 'episode') {
                    const { data, error } = await supabaseClient
                        .from('episodes')
                        .select('*, seasons(series_id, series:series_id(title))')
                        .eq('id', contentId)
                        .single();
                    if (error) throw error;
                    contentData = data;
                    videoUrl = data.video_url;
                    const seriesTitle = data.seasons?.series?.title || 'Series';
                    document.getElementById('videoTitle').innerText = `${seriesTitle} - E${data.episode_number}: ${data.title}`;
                    document.getElementById('videoDescription').innerText = data.description || '';
                    document.getElementById('contentTypeBadge').innerHTML = 'Episode';
                    if (data.duration) {
                        const mins = Math.floor(data.duration / 60);
                        const secs = data.duration % 60;
                        document.getElementById('videoDuration').innerHTML = `<i class="fas fa-clock me-1"></i> ${mins}:${secs.toString().padStart(2,'0')}`;
                        duration = data.duration;
                    }
                }
                else {
                    throw new Error('Invalid content type');
                }
            } catch(e) {
                console.error(e);
                document.getElementById('videoTitle').innerText = 'Error loading content';
            }
        }
        
        // ============================================
        // INITIALIZE PLAYER (Cloudinary or Native)
        // ============================================
        function initPlayer() {
            if (!videoUrl) {
                document.getElementById('videoTitle').innerText = 'Video URL not available';
                return;
            }
            
            const videoElement = document.getElementById('videoPlayer');
            const isCloudinary = videoUrl.includes('cloudinary.com');
            
            if (isCloudinary) {
                // Cloudinary Player
                player = cloudinary.videoPlayer(videoElement, {
                    cloudName: CLOUD_NAME,
                    logo: false,
                    showLogo: false,
                    controls: true,
                    autoplay: false,
                    muted: false,
                    playbackRates: [0.5, 0.75, 1, 1.25, 1.5, 2]
                });
                player.source(videoUrl);
                player.ready(() => {
                    setupProgressSaving();
                    loadSavedProgress();
                });
            } else {
                // Native HTML5 fallback
                videoElement.classList.remove('cld-video-player');
                videoElement.setAttribute('src', videoUrl);
                videoElement.controls = true;
                // Create wrapper to match Cloudinary player API
                player = {
                    currentTime: () => videoElement.currentTime,
                    duration: () => videoElement.duration,
                    on: (event, callback) => {
                        if (event === 'timeupdate') videoElement.addEventListener('timeupdate', callback);
                        if (event === 'pause') videoElement.addEventListener('pause', callback);
                        if (event === 'ended') videoElement.addEventListener('ended', callback);
                        if (event === 'ready') videoElement.addEventListener('loadedmetadata', callback);
                    },
                    currentTime: (time) => { videoElement.currentTime = time; },
                    source: (src) => { videoElement.src = src; }
                };
                videoElement.addEventListener('loadedmetadata', () => {
                    duration = videoElement.duration;
                    setupProgressSaving();
                    loadSavedProgress();
                });
            }
        }
        
        // ============================================
        // LOAD SAVED PROGRESS (LocalStorage or Supabase)
        // ============================================
        async function loadSavedProgress() {
            if (!contentData) return;
            let savedProgress = 0;
            
            if (currentUser) {
                const { data, error } = await supabaseClient
                    .from('watch_history')
                    .select('progress_seconds')
                    .eq('user_id', currentUser.id)
                    .eq('content_type', contentType)
                    .eq('content_id', contentId)
                    .maybeSingle();
                if (!error && data) savedProgress = data.progress_seconds;
            } else {
                const guestKey = `guest_watch_${contentType}_${contentId}`;
                const saved = localStorage.getItem(guestKey);
                if (saved) savedProgress = parseInt(saved, 10);
            }
            
            if (savedProgress > 5) {
                const totalDur = player.duration() || duration;
                if (totalDur === 0 || savedProgress < totalDur * 0.95) {
                    if (confirm(`You left off at ${Math.floor(savedProgress/60)}:${(savedProgress%60).toString().padStart(2,'0')}. Resume watching?`)) {
                        setTimeout(() => { player.currentTime(savedProgress); }, 500);
                    }
                }
            }
        }
        
        // ============================================
        // SAVE PROGRESS (every 5 seconds, on pause, on ended)
        // ============================================
        function setupProgressSaving() {
            let lastSaved = 0;
            player.on('timeupdate', () => {
                const currentTime = Math.floor(player.currentTime());
                if (currentTime > 0 && currentTime !== lastSaved && currentTime % 5 === 0) {
                    lastSaved = currentTime;
                    saveProgress(currentTime);
                }
            });
            player.on('pause', () => {
                const currentTime = Math.floor(player.currentTime());
                if (currentTime > 0) saveProgress(currentTime);
            });
            player.on('ended', () => {
                const totalDur = Math.floor(player.duration() || duration);
                if (totalDur > 0) saveProgress(totalDur);
            });
        }
        
        async function saveProgress(progressSeconds) {
            if (!contentData) return;
            if (currentUser) {
                try {
                    await supabaseClient
                        .from('watch_history')
                        .upsert({
                            user_id: currentUser.id,
                            content_type: contentType,
                            content_id: contentId,
                            progress_seconds: progressSeconds,
                            watched_at: new Date().toISOString()
                        }, { onConflict: 'user_id, content_type, content_id' });
                } catch(e) { console.error("Save error:", e); }
            } else {
                const guestKey = `guest_watch_${contentType}_${contentId}`;
                localStorage.setItem(guestKey, progressSeconds.toString());
            }
        }
        
        // ============================================
        // MAIN INITIALIZATION
        // ============================================
        (async function() {
            if (!contentType || !contentId) {
                alert('Invalid video parameters');
                window.location.href = '/index.html';
                return;
            }
            await getCurrentUser();
            await loadContent();
            if (!videoUrl) {
                document.getElementById('videoTitle').innerText = 'Video not available';
                return;
            }
            initPlayer();
        })();
    </script>
</body>
</html>
