<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IndieMotion - Movies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Movie Card Styles - 16:9 Thumbnail */
        .movie-card {
            transition: transform 0.3s ease;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            background: #1a1a1a;
        }
        .movie-card:hover {
            transform: scale(1.05);
            z-index: 10;
        }
        .thumbnail-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #0a0a0a;
        }
        .thumbnail-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .movie-card:hover .thumbnail-container img {
            transform: scale(1.02);
        }
        .movie-info {
            padding: 0.75rem;
        }
        .movie-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .movie-meta {
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .filters-section {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .page-link {
            background-color: #2c2c2c;
            border-color: #404040;
            color: white;
        }
        .page-link:hover {
            background-color: #e50914;
            border-color: #e50914;
        }
        .page-item.active .page-link {
            background-color: #e50914;
            border-color: #e50914;
        }
        @media (max-width: 576px) {
            .movie-title { font-size: 0.75rem; }
            .movie-meta { font-size: 0.65rem; }
            .movie-info { padding: 0.5rem; }
        }
    </style>
</head>
<body class="bg-dark-dark">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top py-3">
        <div class="container-fluid px-4 px-lg-5">
            <a class="navbar-brand fw-bold fs-3" href="index.html"><span style="color: white;">Indie</span><span style="color: #e50914;">Motion</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMain">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="movies.html">Movies</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Series</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3" id="authNav"></div>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="container-fluid px-4 px-lg-5 pt-5 mt-4">
        <h1 class="display-5 fw-bold">Movies</h1>
        <p class="text-white-50">Discover independent films from around the world</p>
    </div>

    <!-- Filters Section -->
    <div class="container-fluid px-4 px-lg-5">
        <div class="filters-section">
            <div class="row g-3 align-items-end">
                <div class="col-md-5 col-lg-6">
                    <label class="form-label text-white-50 small">Search</label>
                    <div class="input-group">
                        <input type="text" id="searchInput" class="form-control bg-dark border-secondary text-white" placeholder="Movie title...">
                        <button class="btn btn-danger" id="searchBtn"><i class="fas fa-search"></i></button>
                    </div>
                </div>
                <div class="col-md-3 col-lg-3">
                    <label class="form-label text-white-50 small">Genre</label>
                    <select id="genreFilter" class="form-select bg-dark border-secondary text-white">
                        <option value="">All Genres</option>
                    </select>
                </div>
                <div class="col-md-2 col-lg-2">
                    <label class="form-label text-white-50 small">Year</label>
                    <select id="yearFilter" class="form-select bg-dark border-secondary text-white">
                        <option value="">All Years</option>
                    </select>
                </div>
                <div class="col-md-2 col-lg-1">
                    <button id="resetFilters" class="btn btn-outline-secondary w-100">Reset</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Movies Grid (16:9 thumbnails) -->
    <div class="container-fluid px-4 px-lg-5">
        <div class="row g-4" id="moviesGrid">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-danger" role="status"></div>
            </div>
        </div>
        <!-- Pagination -->
        <div class="d-flex justify-content-center mt-5">
            <nav aria-label="Page navigation">
                <ul class="pagination" id="pagination"></ul>
            </nav>
        </div>
    </div>

    <footer class="footer mt-5 py-4 text-center text-white-50 small">
        <p>&copy; 2025 IndieMotion. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="main.js"></script>
    <script>
        let currentPage = 1;
        const limit = 24;
        let totalCount = 0;
        let currentFilters = { search: '', genreId: '', year: '' };

        async function loadGenres() {
            const { data, error } = await window.supabaseClient.from('genres').select('id, name').order('name');
            if (error) console.error(error);
            else {
                const select = document.getElementById('genreFilter');
                select.innerHTML = '<option value="">All Genres</option>';
                data.forEach(genre => {
                    select.innerHTML += `<option value="${genre.id}">${genre.name}</option>`;
                });
            }
        }

        async function loadYears() {
            const { data, error } = await window.supabaseClient.from('movies').select('release_year').order('release_year', { ascending: false });
            if (error) console.error(error);
            else {
                const years = [...new Set(data.map(m => m.release_year).filter(y => y))];
                const select = document.getElementById('yearFilter');
                select.innerHTML = '<option value="">All Years</option>';
                years.forEach(year => {
                    select.innerHTML += `<option value="${year}">${year}</option>`;
                });
            }
        }

        async function fetchMovies() {
            let query = window.supabaseClient.from('movies').select('*, genres(name)', { count: 'exact' });
            
            if (currentFilters.search) {
                query = query.ilike('title', `%${currentFilters.search}%`);
            }
            if (currentFilters.genreId) {
                query = query.eq('genre_id', currentFilters.genreId);
            }
            if (currentFilters.year) {
                query = query.eq('release_year', parseInt(currentFilters.year));
            }
            
            const from = (currentPage - 1) * limit;
            const to = from + limit - 1;
            const { data, error, count } = await query.range(from, to).order('release_year', { ascending: false });
            
            if (error) {
                console.error(error);
                return [];
            }
            totalCount = count || 0;
            return data || [];
        }

        function renderMovies(movies) {
            const grid = document.getElementById('moviesGrid');
            if (!movies.length) {
                grid.innerHTML = `<div class="col-12 text-center py-5"><p class="text-white-50">No movies found.</p></div>`;
                return;
            }
            grid.innerHTML = movies.map(movie => `
                <div class="col-6 col-md-4 col-lg-3 col-xl-2">
                    <div class="movie-card" onclick="window.location.href='movie-details.html?id=${movie.id}'">
                        <div class="thumbnail-container">
                            <img src="${movie.poster_url || 'https://picsum.photos/id/0/300/169'}" alt="${movie.title}" loading="lazy">
                        </div>
                        <div class="movie-info">
                            <div class="movie-title text-white">${movie.title}</div>
                            <div class="movie-meta text-white-50">
                                <span>${movie.release_year || 'N/A'}</span>
                                <span><i class="fas fa-star text-warning"></i> ${movie.rating?.toFixed(1) || '0'}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderPagination() {
            const totalPages = Math.ceil(totalCount / limit);
            const pagination = document.getElementById('pagination');
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            let html = '';
            html += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}"><a class="page-link" href="#" data-page="${currentPage-1}">Previous</a></li>`;
            let start = Math.max(1, currentPage - 2);
            let end = Math.min(totalPages, currentPage + 2);
            for (let i = start; i <= end; i++) {
                html += `<li class="page-item ${i === currentPage ? 'active' : ''}"><a class="page-link" href="#" data-page="${i}">${i}</a></li>`;
            }
            html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}"><a class="page-link" href="#" data-page="${currentPage+1}">Next</a></li>`;
            pagination.innerHTML = html;
            document.querySelectorAll('.page-link[data-page]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const page = parseInt(link.dataset.page);
                    if (!isNaN(page) && page !== currentPage && page >= 1 && page <= totalPages) {
                        currentPage = page;
                        loadAndRender();
                    }
                });
            });
        }

        async function loadAndRender() {
            document.getElementById('moviesGrid').innerHTML = `<div class="col-12 text-center py-5"><div class="spinner-border text-danger"></div></div>`;
            const movies = await fetchMovies();
            renderMovies(movies);
            renderPagination();
        }

        function applyFilters() {
            currentFilters.search = document.getElementById('searchInput').value.trim();
            currentFilters.genreId = document.getElementById('genreFilter').value;
            currentFilters.year = document.getElementById('yearFilter').value;
            currentPage = 1;
            loadAndRender();
        }

        // Event listeners
        document.getElementById('searchBtn').addEventListener('click', applyFilters);
        document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') applyFilters(); });
        document.getElementById('genreFilter').addEventListener('change', applyFilters);
        document.getElementById('yearFilter').addEventListener('change', applyFilters);
        document.getElementById('resetFilters').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('genreFilter').value = '';
            document.getElementById('yearFilter').value = '';
            applyFilters();
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            await loadGenres();
            await loadYears();
            applyFilters();
        });
    </script>
</body>
</html>
