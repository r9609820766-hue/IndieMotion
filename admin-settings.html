<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - IndieMotion Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; }
        .navbar-admin { background: #0f0f0f; border-bottom: 1px solid #222; padding: 0.75rem 1.5rem; }
        .navbar-brand { font-size: 1.8rem; font-weight: 800; }
        .navbar-brand .indie { color: white; }
        .navbar-brand .motion { color: #e50914; }
        .offcanvas { background: linear-gradient(180deg, #0f0f0f 0%, #050505 100%); width: 280px; border-right: 1px solid #222; }
        .nav-admin .nav-link { color: #b3b3b3; padding: 0.75rem 1rem; border-radius: 12px; transition: 0.2s; font-weight: 500; }
        .nav-admin .nav-link i { width: 28px; margin-right: 8px; }
        .nav-admin .nav-link:hover, .nav-admin .nav-link.active { background: #e50914; color: white; }
        .admin-content { padding: 2rem; margin-top: 70px; }
        .settings-card { background: #141414; border-radius: 20px; padding: 2rem; border: 1px solid #2a2a2a; max-width: 800px; margin: 0 auto; }
        .form-control, .form-select { background-color: #2c2c2c; border: 1px solid #404040; color: white; }
        .form-control:focus, .form-select:focus { border-color: #e50914; box-shadow: 0 0 0 0.2rem rgba(229,9,20,0.25); }
        .btn-danger { background-color: #e50914; border: none; }
        .btn-danger:hover { background-color: #f6121d; }
        @media (max-width: 768px) { .admin-content { padding: 1rem; } }
    </style>
</head>
<body>

    <!-- Top Navbar -->
    <nav class="navbar navbar-admin fixed-top">
        <div class="container-fluid">
            <button class="btn btn-link text-white" type="button" data-bs-toggle="offcanvas" data-bs-target="#adminSidebar">
                <i class="fas fa-bars fs-4"></i>
            </button>
            <a class="navbar-brand mx-auto" href="#"><span class="indie">Indie</span><span class="motion">Motion</span></a>
            <div class="dropdown">
                <button class="btn btn-link text-white dropdown-toggle" type="button" data-bs-toggle="dropdown">
                    <i class="fas fa-user-circle fs-4"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
                    <li><span id="adminEmailDisplay" class="dropdown-item-text small text-white-50"></span></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="#" id="adminLogoutBtn"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="adminSidebar">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title text-white">Menu</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <ul class="nav nav-admin flex-column">
                <li class="nav-item"><a class="nav-link" href="admin-dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-movies.html"><i class="fas fa-film"></i> Movies</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-series.html"><i class="fas fa-tv"></i> Series</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-categories.html"><i class="fas fa-tags"></i> Categories</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-genres.html"><i class="fas fa-music"></i> Genres</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-users.html"><i class="fas fa-users"></i> Users</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-reports.html"><i class="fas fa-chart-line"></i> Reports</a></li>
                <li class="nav-item"><a class="nav-link active" href="admin-settings.html"><i class="fas fa-cog"></i> Settings</a></li>
            </ul>
            <hr class="bg-secondary my-4">
            <button id="adminLogoutBtnSidebar" class="btn btn-outline-danger w-100"><i class="fas fa-sign-out-alt me-2"></i>Logout</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="admin-content">
        <div class="settings-card">
            <h2 class="mb-4 text-center">System Settings</h2>
            <form id="settingsForm">
                <div class="mb-3">
                    <label class="form-label">Site Name</label>
                    <input type="text" id="site_name" class="form-control" placeholder="IndieMotion">
                </div>
                <div class="mb-3">
                    <label class="form-label">Site Logo URL</label>
                    <input type="text" id="site_logo" class="form-control" placeholder="https://example.com/logo.png">
                </div>
                <div class="mb-3">
                    <label class="form-label">Contact Email</label>
                    <input type="email" id="contact_email" class="form-control" placeholder="support@example.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Contact Phone</label>
                    <input type="text" id="contact_phone" class="form-control" placeholder="+1 234 567 8900">
                </div>
                <div class="mb-3">
                    <label class="form-label">Footer Text (optional)</label>
                    <input type="text" id="footer_text" class="form-control" placeholder="© 2025 IndieMotion">
                </div>
                <button type="submit" class="btn btn-danger w-100">Save Settings</button>
                <div id="saveMessage" class="mt-3 text-center small"></div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://lxqxdtsgwgdogmncgaqj.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4cXhkdHNnd2dkb2dtbmNnYXFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODkyMTgsImV4cCI6MjA5Njc2NTIxOH0.pkJOOXG9NkVqsRloO3lm1dRWXcrQESBlEiXW8g_Oh-8';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let currentAdmin = null;

        async function checkAdmin() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = '/admin-login.html'; return false; }
            const { data: profile } = await supabaseClient.from('profiles').select('role').eq('id', session.user.id).single();
            if (!profile || profile.role !== 'admin') { await supabaseClient.auth.signOut(); window.location.href = '/admin-login.html'; return false; }
            currentAdmin = session.user;
            document.getElementById('adminEmailDisplay').innerText = currentAdmin.email;
            return true;
        }

        async function loadSettings() {
            const { data, error } = await supabaseClient.from('settings').select('key, value');
            if (error) { console.error(error); return; }
            const settingsMap = {};
            data.forEach(s => { settingsMap[s.key] = s.value; });
            document.getElementById('site_name').value = settingsMap['site_name'] || '';
            document.getElementById('site_logo').value = settingsMap['site_logo'] || '';
            document.getElementById('contact_email').value = settingsMap['contact_email'] || '';
            document.getElementById('contact_phone').value = settingsMap['contact_phone'] || '';
            document.getElementById('footer_text').value = settingsMap['footer_text'] || '';
        }

        async function saveSettings(e) {
            e.preventDefault();
            const settings = [
                { key: 'site_name', value: document.getElementById('site_name').value },
                { key: 'site_logo', value: document.getElementById('site_logo').value },
                { key: 'contact_email', value: document.getElementById('contact_email').value },
                { key: 'contact_phone', value: document.getElementById('contact_phone').value },
                { key: 'footer_text', value: document.getElementById('footer_text').value }
            ];
            for (const s of settings) {
                const { error } = await supabaseClient
                    .from('settings')
                    .upsert({ key: s.key, value: s.value }, { onConflict: 'key' });
                if (error) {
                    document.getElementById('saveMessage').innerHTML = '<span class="text-danger">Error saving: ' + error.message + '</span>';
                    return;
                }
            }
            document.getElementById('saveMessage').innerHTML = '<span class="text-success">Settings saved successfully!</span>';
            setTimeout(() => { document.getElementById('saveMessage').innerHTML = ''; }, 3000);
        }

        function setupLogout() {
            const fn = async () => { await supabaseClient.auth.signOut(); window.location.href = '/admin-login.html'; };
            document.getElementById('adminLogoutBtn')?.addEventListener('click', fn);
            document.getElementById('adminLogoutBtnSidebar')?.addEventListener('click', fn);
        }

        (async () => {
            if (await checkAdmin()) {
                await loadSettings();
                document.getElementById('settingsForm').addEventListener('submit', saveSettings);
                setupLogout();
            }
        })();
    </script>
</body>
</html>
