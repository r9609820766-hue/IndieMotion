<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Series - IndieMotion Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; }
        .navbar-admin { background: #0f0f0f; border-bottom: 1px solid #222; padding: 0.75rem 1.5rem; }
        .navbar-brand { font-size: 1.8rem; font-weight: 800; }
        .navbar-brand .indie { color: white; }
        .navbar-brand .motion { color: #e50914; }
        .offcanvas { background: linear-gradient(180deg, #0f0f0f 0%, #050505 100%); width: 280px; border-right: 1px solid #222; }
        .nav-admin .nav-link { color: #b3b3b3; padding: 0.75rem 1rem; border-radius: 12px; transition: 0.2s; font-weight: 500; }
        .nav-admin .nav-link i { width: 28px; margin-right: 8px; }
        .nav-admin .nav-link:hover, .nav-admin .nav-link.active { background: #e50914; color: white; }
        .admin-content { padding: 2rem; margin-top: 70px; }
        .series-card { background: #141414; border-radius: 16px; padding: 1rem; margin-bottom: 1rem; transition: 0.2s; border: 1px solid #2a2a2a; }
        .series-card:hover { border-color: #e50914; transform: translateY(-3px); }
        .season-card { background: #1a1a1a; border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; border-left: 3px solid #e50914; }
        .episode-card { background: #222; border-radius: 8px; padding: 0.75rem; margin-bottom: 0.5rem; margin-left: 1rem; }
        .btn-sm-action { padding: 0.25rem 0.5rem; font-size: 0.75rem; }
        .form-control, .form-select { background-color: #2c2c2c; border: 1px solid #404040; color: white; }
        .form-control:focus, .form-select:focus { border-color: #e50914; box-shadow: 0 0 0 0.2rem rgba(229,9,20,0.25); }
        .upload-area { border: 2px dashed #404040; border-radius: 8px; padding: 1rem; text-align: center; cursor: pointer; transition: all 0.2s; }
        .upload-area:hover { border-color: #e50914; background: rgba(229,9,20,0.1); }
        .modal-content { background: #141414; border: 1px solid #333; }
        @media (max-width: 768px) { .admin-content { padding: 1rem; } }
    </style>
</head>
<body>

    <!-- Top Navbar -->
    <nav class="navbar navbar-admin fixed-top">
        <div class="container-fluid">
            <button class="btn btn-link text-white" type="button" data-bs-toggle="offcanvas" data-bs-target="#adminSidebar">
                <i class="fas fa-bars fs-4"></i>
            </button>
            <a class="navbar-brand mx-auto" href="#"><span class="indie">Indie</span><span class="motion">Motion</span></a>
            <div class="dropdown">
                <button class="btn btn-link text-white dropdown-toggle" type="button" data-bs-toggle="dropdown">
                    <i class="fas fa-user-circle fs-4"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
                    <li><span id="adminEmailDisplay" class="dropdown-item-text small text-white-50"></span></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="#" id="adminLogoutBtn"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="adminSidebar">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title text-white">Menu</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <ul class="nav nav-admin flex-column">
                <li class="nav-item"><a class="nav-link" href="admin-dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-movies.html"><i class="fas fa-film"></i> Movies</a></li>
                <li class="nav-item"><a class="nav-link active" href="admin-series.html"><i class="fas fa-tv"></i> Series</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-categories.html"><i class="fas fa-tags"></i> Categories</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-genres.html"><i class="fas fa-music"></i> Genres</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-users.html"><i class="fas fa-users"></i> Users</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-reports.html"><i class="fas fa-chart-line"></i> Reports</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-settings.html"><i class="fas fa-cog"></i> Settings</a></li>
            </ul>
            <hr class="bg-secondary my-4">
            <button id="adminLogoutBtnSidebar" class="btn btn-outline-danger w-100"><i class="fas fa-sign-out-alt me-2"></i>Logout</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="admin-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Manage Series</h2>
            <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#seriesModal" onclick="openSeriesModal()">
                <i class="fas fa-plus me-2"></i>Add Series
            </button>
        </div>

        <!-- Series List -->
        <div id="seriesListContainer"></div>
    </div>

    <!-- Series Modal (with video upload) -->
    <div class="modal fade" id="seriesModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-white" id="seriesModalTitle">Add Series</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="seriesForm">
                        <input type="hidden" id="seriesId">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Title*</label>
                                <input type="text" id="seriesTitle" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Release Year</label>
                                <input type="number" id="seriesReleaseYear" class="form-control">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea id="seriesDescription" rows="3" class="form-control"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Genre</label>
                                <select id="seriesGenreId" class="form-select"></select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Category (Movie/TV)</label>
                                <select id="seriesCategoryId" class="form-select"></select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Featured</label>
                            <select id="seriesFeatured" class="form-select">
                                <option value="false">No</option>
                                <option value="true">Yes</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Poster URL (upload or paste)</label>
                            <div class="upload-area" id="seriesPosterArea">
                                <i class="fas fa-cloud-upload-alt fa-2x"></i>
                                <p>Click to upload poster</p>
                                <input type="file" id="seriesPosterFile" accept="image/*" style="display:none">
                            </div>
                            <input type="text" id="seriesPosterUrl" class="form-control mt-2" placeholder="Or paste image URL">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Series Video (Trailer / Intro)</label>
                            <div class="upload-area" id="seriesVideoArea">
                                <i class="fas fa-video fa-2x"></i>
                                <p>Click to upload video</p>
                                <input type="file" id="seriesVideoFile" accept="video/*" style="display:none">
                            </div>
                            <input type="text" id="seriesVideoUrl" class="form-control mt-2" placeholder="Or paste video URL">
                        </div>
                        <button type="submit" class="btn btn-danger w-100">Save Series</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Season Modal -->
    <div class="modal fade" id="seasonModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-white">Manage Season</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="seasonForm">
                        <input type="hidden" id="seasonId">
                        <input type="hidden" id="seasonSeriesId">
                        <div class="mb-3">
                            <label class="form-label">Season Number*</label>
                            <input type="number" id="seasonNumber" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" id="seasonTitle" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Poster URL</label>
                            <input type="text" id="seasonPosterUrl" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-danger w-100">Save Season</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Episode Modal -->
    <div class="modal fade" id="episodeModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-white">Manage Episode</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="episodeForm">
                        <input type="hidden" id="episodeId">
                        <input type="hidden" id="episodeSeasonId">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Episode Number*</label>
                                <input type="number" id="episodeNumber" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Duration (seconds)</label>
                                <input type="number" id="episodeDuration" class="form-control">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Title*</label>
                            <input type="text" id="episodeTitle" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea id="episodeDescription" rows="2" class="form-control"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Thumbnail</label>
                            <div class="upload-area" id="episodeThumbArea">
                                <i class="fas fa-image fa-2x"></i>
                                <p>Click to upload thumbnail</p>
                                <input type="file" id="episodeThumbFile" accept="image/*" style="display:none">
                            </div>
                            <input type="text" id="episodeThumbnail" class="form-control mt-2" placeholder="Or paste image URL">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Video URL</label>
                            <div class="upload-area" id="episodeVideoArea">
                                <i class="fas fa-video fa-2x"></i>
                                <p>Click to upload video</p>
                                <input type="file" id="episodeVideoFile" accept="video/*" style="display:none">
                            </div>
                            <input type="text" id="episodeVideoUrl" class="form-control mt-2" placeholder="Or paste video URL">
                        </div>
                        <button type="submit" class="btn btn-danger w-100">Save Episode</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const CLOUD_NAME = 'drf0guw5w';
        const UPLOAD_PRESET = 'indiemotion_unsigned';
        const SB_URL = 'https://lxqxdtsgwgdogmncgaqj.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4cXhkdHNnd2dkb2dtbmNnYXFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODkyMTgsImV4cCI6MjA5Njc2NTIxOH0.pkJOOXG9NkVqsRloO3lm1dRWXcrQESBlEiXW8g_Oh-8';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        
        let currentAdmin = null;
        let genres = [], categories = [];

        // Helper: Upload to Cloudinary
        async function uploadToCloudinary(file) {
            if (!file) return null;
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: 'POST', body: formData });
            const data = await response.json();
            return data.secure_url;
        }

        // Auth check
        async function checkAdmin() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = '/admin-login.html'; return false; }
            const { data: profile } = await supabaseClient.from('profiles').select('role').eq('id', session.user.id).single();
            if (!profile || profile.role !== 'admin') { await supabaseClient.auth.signOut(); window.location.href = '/admin-login.html'; return false; }
            currentAdmin = session.user;
            document.getElementById('adminEmailDisplay').innerText = currentAdmin.email;
            return true;
        }

        // Load genres & categories into series modal
        async function loadSelects() {
            const { data: g } = await supabaseClient.from('genres').select('id,name').order('name');
            genres = g || [];
            const genreSelect = document.getElementById('seriesGenreId');
            genreSelect.innerHTML = '<option value="">Select Genre</option>' + genres.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
            
            const { data: c } = await supabaseClient.from('categories').select('id,name').order('name');
            categories = c || [];
            const catSelect = document.getElementById('seriesCategoryId');
            catSelect.innerHTML = '<option value="">Select Category</option>' + categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        // Load all series with seasons & episodes
        async function loadSeries() {
            const { data: seriesList, error } = await supabaseClient
                .from('series')
                .select('*, genres(name)')
                .order('created_at', { ascending: false });
            if (error) { console.error(error); return; }
            const container = document.getElementById('seriesListContainer');
            if (!seriesList.length) { container.innerHTML = '<div class="text-center text-white-50 py-5">No series yet. Click "Add Series".</div>'; return; }
            
            let html = '';
            for (const series of seriesList) {
                // Load seasons for this series
                const { data: seasons } = await supabaseClient
                    .from('seasons')
                    .select('*')
                    .eq('series_id', series.id)
                    .order('season_number', { ascending: true });
                let seasonsHtml = '';
                if (seasons && seasons.length) {
                    for (const season of seasons) {
                        // Load episodes for this season
                        const { data: episodes } = await supabaseClient
                            .from('episodes')
                            .select('*')
                            .eq('season_id', season.id)
                            .order('episode_number', { ascending: true });
                        let episodesHtml = '';
                        if (episodes && episodes.length) {
                            episodesHtml = episodes.map(ep => `
                                <div class="episode-card d-flex justify-content-between align-items-center">
                                    <div><strong>E${ep.episode_number}:</strong> ${ep.title} ${ep.duration ? `(${Math.floor(ep.duration/60)} min)` : ''}</div>
                                    <div>
                                        <button class="btn btn-sm btn-outline-primary btn-sm-action me-1" onclick="openEpisodeModal('${ep.id}', '${season.id}')"><i class="fas fa-edit"></i></button>
                                        <button class="btn btn-sm btn-outline-danger btn-sm-action" onclick="deleteEpisode('${ep.id}')"><i class="fas fa-trash"></i></button>
                                    </div>
                                </div>
                            `).join('');
                        }
                        seasonsHtml += `
                            <div class="season-card">
                                <div class="d-flex justify-content-between align-items-center">
                                    <h6 class="mb-0">Season ${season.season_number}: ${season.title || ''}</h6>
                                    <div>
                                        <button class="btn btn-sm btn-outline-secondary me-1" onclick="openSeasonModal('${season.id}', '${series.id}', ${season.season_number}, '${season.title || ''}')"><i class="fas fa-edit"></i></button>
                                        <button class="btn btn-sm btn-outline-danger" onclick="deleteSeason('${season.id}')"><i class="fas fa-trash"></i></button>
                                        <button class="btn btn-sm btn-danger ms-2" onclick="openEpisodeModal(null, '${season.id}')"><i class="fas fa-plus"></i> Episode</button>
                                    </div>
                                </div>
                                ${episodesHtml}
                            </div>
                        `;
                    }
                } else {
                    seasonsHtml = '<div class="text-white-50 small">No seasons yet. <button class="btn btn-link btn-sm text-danger" onclick="openSeasonModal(null, \''+series.id+'\')">Add Season</button></div>';
                }
                html += `
                    <div class="series-card">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="d-flex gap-3">
                                <img src="${series.poster_url || 'https://picsum.photos/60/80'}" style="width: 60px; height: 80px; object-fit: cover; border-radius: 6px;">
                                <div>
                                    <h4 class="mb-1">${series.title}</h4>
                                    <div class="small text-white-50">${series.genres?.name || 'No genre'} • ${series.release_year || 'N/A'} • ${series.featured ? 'Featured' : ''}</div>
                                    <p class="small mt-1">${series.description?.substring(0, 100) || ''}</p>
                                    ${series.video_url ? `<span class="badge bg-danger mt-1">Has Video</span>` : ''}
                                </div>
                            </div>
                            <div>
                                <button class="btn btn-sm btn-outline-primary me-1" onclick="openSeriesModal('${series.id}')"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteSeries('${series.id}')"><i class="fas fa-trash"></i></button>
                                <button class="btn btn-sm btn-danger ms-2" onclick="openSeasonModal(null, '${series.id}')"><i class="fas fa-plus"></i> Season</button>
                            </div>
                        </div>
                        <div class="mt-3">
                            ${seasonsHtml}
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        // Series CRUD (with video)
        function openSeriesModal(seriesId = null) {
            const modal = new bootstrap.Modal(document.getElementById('seriesModal'));
            if (seriesId) {
                supabaseClient.from('series').select('*').eq('id', seriesId).single().then(({ data }) => {
                    if (data) {
                        document.getElementById('seriesId').value = data.id;
                        document.getElementById('seriesTitle').value = data.title || '';
                        document.getElementById('seriesDescription').value = data.description || '';
                        document.getElementById('seriesReleaseYear').value = data.release_year || '';
                        document.getElementById('seriesFeatured').value = data.featured ? 'true' : 'false';
                        document.getElementById('seriesPosterUrl').value = data.poster_url || '';
                        document.getElementById('seriesVideoUrl').value = data.video_url || '';
                        if (data.genre_id) document.getElementById('seriesGenreId').value = data.genre_id;
                        if (data.category_id) document.getElementById('seriesCategoryId').value = data.category_id;
                        document.getElementById('seriesModalTitle').innerText = 'Edit Series';
                        modal.show();
                    }
                });
            } else {
                document.getElementById('seriesForm').reset();
                document.getElementById('seriesId').value = '';
                document.getElementById('seriesModalTitle').innerText = 'Add Series';
                modal.show();
            }
        }

        document.getElementById('seriesForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('seriesId').value;
            const title = document.getElementById('seriesTitle').value;
            const description = document.getElementById('seriesDescription').value;
            const release_year = parseInt(document.getElementById('seriesReleaseYear').value) || null;
            const featured = document.getElementById('seriesFeatured').value === 'true';
            const genre_id = document.getElementById('seriesGenreId').value || null;
            const category_id = document.getElementById('seriesCategoryId').value || null;
            let poster_url = document.getElementById('seriesPosterUrl').value;
            let video_url = document.getElementById('seriesVideoUrl').value;
            const posterFile = document.getElementById('seriesPosterFile').files[0];
            const videoFile = document.getElementById('seriesVideoFile').files[0];
            if (posterFile) poster_url = await uploadToCloudinary(posterFile);
            if (videoFile) video_url = await uploadToCloudinary(videoFile);
            const data = { title, description, release_year, featured, genre_id, category_id, poster_url, video_url };
            if (id) await supabaseClient.from('series').update(data).eq('id', id);
            else await supabaseClient.from('series').insert(data);
            bootstrap.Modal.getInstance(document.getElementById('seriesModal')).hide();
            loadSeries();
        });

        async function deleteSeries(id) {
            if (!confirm('Delete this series? All seasons and episodes will be deleted.')) return;
            await supabaseClient.from('series').delete().eq('id', id);
            loadSeries();
        }

        // Season CRUD (unchanged)
        function openSeasonModal(seasonId = null, seriesId = null, seasonNumber = null, seasonTitle = '') {
            if (seasonId) {
                supabaseClient.from('seasons').select('*').eq('id', seasonId).single().then(({ data }) => {
                    if (data) {
                        document.getElementById('seasonId').value = data.id;
                        document.getElementById('seasonSeriesId').value = data.series_id;
                        document.getElementById('seasonNumber').value = data.season_number;
                        document.getElementById('seasonTitle').value = data.title || '';
                        document.getElementById('seasonPosterUrl').value = data.poster_url || '';
                        new bootstrap.Modal(document.getElementById('seasonModal')).show();
                    }
                });
            } else if (seriesId) {
                document.getElementById('seasonId').value = '';
                document.getElementById('seasonSeriesId').value = seriesId;
                document.getElementById('seasonNumber').value = '';
                document.getElementById('seasonTitle').value = '';
                document.getElementById('seasonPosterUrl').value = '';
                new bootstrap.Modal(document.getElementById('seasonModal')).show();
            }
        }

        document.getElementById('seasonForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('seasonId').value;
            const series_id = document.getElementById('seasonSeriesId').value;
            const season_number = parseInt(document.getElementById('seasonNumber').value);
            const title = document.getElementById('seasonTitle').value;
            const poster_url = document.getElementById('seasonPosterUrl').value;
            const data = { series_id, season_number, title, poster_url };
            if (id) await supabaseClient.from('seasons').update(data).eq('id', id);
            else await supabaseClient.from('seasons').insert(data);
            bootstrap.Modal.getInstance(document.getElementById('seasonModal')).hide();
            loadSeries();
        });

        async function deleteSeason(id) {
            if (!confirm('Delete this season? All episodes will be deleted.')) return;
            await supabaseClient.from('seasons').delete().eq('id', id);
            loadSeries();
        }

        // Episode CRUD (unchanged)
        async function openEpisodeModal(episodeId = null, seasonId = null) {
            if (episodeId) {
                const { data } = await supabaseClient.from('episodes').select('*').eq('id', episodeId).single();
                if (data) {
                    document.getElementById('episodeId').value = data.id;
                    document.getElementById('episodeSeasonId').value = data.season_id;
                    document.getElementById('episodeNumber').value = data.episode_number;
                    document.getElementById('episodeTitle').value = data.title;
                    document.getElementById('episodeDescription').value = data.description || '';
                    document.getElementById('episodeDuration').value = data.duration || '';
                    document.getElementById('episodeThumbnail').value = data.thumbnail || '';
                    document.getElementById('episodeVideoUrl').value = data.video_url || '';
                    new bootstrap.Modal(document.getElementById('episodeModal')).show();
                }
            } else if (seasonId) {
                document.getElementById('episodeId').value = '';
                document.getElementById('episodeSeasonId').value = seasonId;
                document.getElementById('episodeNumber').value = '';
                document.getElementById('episodeTitle').value = '';
                document.getElementById('episodeDescription').value = '';
                document.getElementById('episodeDuration').value = '';
                document.getElementById('episodeThumbnail').value = '';
                document.getElementById('episodeVideoUrl').value = '';
                new bootstrap.Modal(document.getElementById('episodeModal')).show();
            }
        }

        document.getElementById('episodeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('episodeId').value;
            const season_id = document.getElementById('episodeSeasonId').value;
            const episode_number = parseInt(document.getElementById('episodeNumber').value);
            const title = document.getElementById('episodeTitle').value;
            const description = document.getElementById('episodeDescription').value;
            const duration = parseInt(document.getElementById('episodeDuration').value) || null;
            let thumbnail = document.getElementById('episodeThumbnail').value;
            let video_url = document.getElementById('episodeVideoUrl').value;
            const thumbFile = document.getElementById('episodeThumbFile').files[0];
            const videoFile = document.getElementById('episodeVideoFile').files[0];
            if (thumbFile) thumbnail = await uploadToCloudinary(thumbFile);
            if (videoFile) video_url = await uploadToCloudinary(videoFile);
            const data = { season_id, episode_number, title, description, duration, thumbnail, video_url };
            if (id) await supabaseClient.from('episodes').update(data).eq('id', id);
            else await supabaseClient.from('episodes').insert(data);
            bootstrap.Modal.getInstance(document.getElementById('episodeModal')).hide();
            loadSeries();
        });

        async function deleteEpisode(id) {
            if (!confirm('Delete this episode?')) return;
            await supabaseClient.from('episodes').delete().eq('id', id);
            loadSeries();
        }

        // Upload area triggers
        document.getElementById('seriesPosterArea').addEventListener('click', () => document.getElementById('seriesPosterFile').click());
        document.getElementById('seriesVideoArea').addEventListener('click', () => document.getElementById('seriesVideoFile').click());
        document.getElementById('episodeThumbArea').addEventListener('click', () => document.getElementById('episodeThumbFile').click());
        document.getElementById('episodeVideoArea').addEventListener('click', () => document.getElementById('episodeVideoFile').click());

        // Logout
        function setupLogout() {
            const fn = async () => { await supabaseClient.auth.signOut(); window.location.href = '/admin-login.html'; };
            document.getElementById('adminLogoutBtn')?.addEventListener('click', fn);
            document.getElementById('adminLogoutBtnSidebar')?.addEventListener('click', fn);
        }

        // Initialize
        (async () => {
            if (await checkAdmin()) {
                await loadSelects();
                await loadSeries();
                setupLogout();
            }
        })();
    </script>
</body>
</html>
